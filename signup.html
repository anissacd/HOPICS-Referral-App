<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPICS — Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page">
        <section class="hero">
            <div class="hero-inner">
                <div class="brand">
                    <div class="brand-mark">H</div>
                    <div class="brand-text">HOPICS</div>
                </div>
                <h1 class="hero-title">Connecting Communities. Changing Lives.</h1>
                <p class="hero-copy">Create an account to manage referrals, support clients, and track outcomes across the agency.</p>
            </div>
        </section>

        <section class="form-panel">
            <div class="form-card">
                <div>
                    <h1>Create your account</h1>
                    <p class="subtitle">Sign up and start managing referrals for your team.</p>
                </div>

                <button class="button-google" type="button">
                    <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="divider">or</div>

                <form novalidate>
                    <div style="display:grid;gap:1.25rem;">
                        <div class="input-group">
                            <label class="input-label" for="fullName">Full name</label>
                            <input class="input-field" type="text" id="fullName" name="fullName"
                                   autocomplete="name" placeholder="Jane Doe" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="email">Email address</label>
                            <input class="input-field" type="email" id="email" name="email"
                                   autocomplete="email" placeholder="you@example.com" required>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="role">Role</label>
                            <select class="input-field" id="role" name="role" required>
                                <option value="" disabled selected>Select your role</option>
                                <option value="case_manager">Case Manager</option>
                                <option value="supervisor">Supervisor</option>
                                <option value="intake_coordinator">Intake Coordinator</option>
                                <option value="outreach_worker">Outreach Worker</option>
                                <option value="admin">Administrator</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="password">Password</label>
                            <div class="password-wrapper">
                                <input class="input-field" type="password" id="password" name="password"
                                       autocomplete="new-password" placeholder="Create a password" required
                                       oninput="updateStrength(this.value)">
                                <button type="button" class="toggle-password" aria-label="Show password"
                                        onclick="toggleVis('password', this)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                            <span class="strength-label" id="strengthLabel">Enter a password</span>
                        </div>

                        <div class="input-group">
                            <label class="input-label" for="confirmPassword">Confirm password</label>
                            <div class="password-wrapper">
                                <input class="input-field" type="password" id="confirmPassword" name="confirmPassword"
                                       autocomplete="new-password" placeholder="Re-enter your password" required>
                                <button type="button" class="toggle-password" aria-label="Show password"
                                        onclick="toggleVis('confirmPassword', this)">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                        <circle cx="12" cy="12" r="3"/>
                                    </svg>
                                </button>
                            </div>
                        </div>

                        <div class="checkbox-row">
                            <input type="checkbox" id="terms" name="terms" required>
                            <label for="terms">
                                I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                            </label>
                        </div>

                        <button class="sign-in" type="submit" onclick="window.location.href='dashboard.html'">
                            Create Account
                        </button>
                    </div>
                </form>

                <p class="footer-text">Already have an account? <a href="index.html">Sign in</a></p>
            </div>
        </section>
    </div>

    <script>
        function toggleVis(id, btn) {
            const f = document.getElementById(id);
            const show = f.type === 'password';
            f.type = show ? 'text' : 'password';
            btn.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
            btn.innerHTML = show
                ? `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                : `<svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        }

        function updateStrength(value) {
            const fill = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');
            let score = 0;
            if (value.length >= 8) score++;
            if (/[A-Z]/.test(value)) score++;
            if (/[0-9]/.test(value)) score++;
            if (/[^A-Za-z0-9]/.test(value)) score++;
            const levels = [
                { width: '0%',   color: '#e5e5ea', text: 'Enter a password' },
                { width: '25%',  color: '#ef4444', text: 'Weak' },
                { width: '50%',  color: '#f97316', text: 'Fair' },
                { width: '75%',  color: '#eab308', text: 'Good' },
                { width: '100%', color: '#22c55e', text: 'Strong' },
            ];
            const lv = value.length === 0 ? levels[0] : levels[score];
            fill.style.width = lv.width;
            fill.style.background = lv.color;
            label.textContent = lv.text;
            label.style.color = lv.color === '#e5e5ea' ? '#aeaeb2' : lv.color;
        }
    </script>
</body>
</html>
