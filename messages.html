<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPICS — Messages</title>
    <link rel="stylesheet" href="styles.css">
    <script src="hopics-utils.js"></script>
    <style>
        /* ── Override app-main padding for messages layout ── */
        .app-main.messages-main {
            padding: 0;
            display: flex;
            overflow: hidden;
            height: 100vh;
        }

        /* ── Thread List Panel ── */
        .thread-panel {
            width: 320px;
            flex-shrink: 0;
            border-right: 1px solid #e5e5ea;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .thread-panel-header {
            padding: 1.5rem 1.25rem 1rem;
            border-bottom: 1px solid #f5f5f7;
            flex-shrink: 0;
        }

        .thread-panel-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 0.875rem;
        }

        .thread-search {
            position: relative;
        }

        .thread-search svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #aeaeb2;
            pointer-events: none;
        }

        .thread-search input {
            width: 100%;
            padding: 0.6rem 0.875rem 0.6rem 2.25rem;
            border-radius: 10px;
            border: 1px solid #d2d2d7;
            background: #f5f5f7;
            font-size: 0.875rem;
            color: #1d1d1f;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .thread-search input::placeholder { color: #aeaeb2; }

        .thread-search input:focus {
            outline: none;
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .thread-list {
            flex: 1;
            overflow-y: auto;
        }

        .thread-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1.25rem;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f7;
            transition: background 0.15s ease;
            position: relative;
        }

        .thread-item:hover { background: #f5f5f7; }

        .thread-item.active {
            background: #fff8e1;
            border-left: 3px solid #ffd700;
        }

        .thread-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #f59e0b 100%);
            display: grid;
            place-items: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #111111;
            flex-shrink: 0;
            letter-spacing: -0.02em;
        }

        .thread-avatar.group {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: #ffffff;
        }

        .thread-info { flex: 1; min-width: 0; }

        .thread-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thread-preview {
            font-size: 0.8rem;
            color: #aeaeb2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.2rem;
        }

        .thread-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .thread-time {
            font-size: 0.75rem;
            color: #aeaeb2;
            white-space: nowrap;
        }

        .unread-badge {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffd700;
            color: #111111;
            font-size: 0.65rem;
            font-weight: 800;
            display: grid;
            place-items: center;
        }

        /* ── Conversation Panel ── */
        .conversation-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #f5f5f7;
            min-width: 0;
        }

        .conversation-header {
            background: #ffffff;
            border-bottom: 1px solid #e5e5ea;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .conversation-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #f59e0b 100%);
            display: grid;
            place-items: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #111111;
            flex-shrink: 0;
            position: relative;
        }

        .conversation-header-avatar.group {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: #ffffff;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid #ffffff;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .conversation-header-info h3 {
            font-size: 0.975rem;
            font-weight: 700;
            color: #1d1d1f;
        }

        .conversation-header-info p {
            font-size: 0.775rem;
            color: #22c55e;
            font-weight: 500;
        }

        .conversation-header-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        /* ── Messages Area ── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .message-bubble-wrap {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .message-bubble-wrap.sent {
            flex-direction: row-reverse;
        }

        .bubble-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e5e5ea 0%, #d2d2d7 100%);
            display: grid;
            place-items: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: #6e6e73;
            flex-shrink: 0;
        }

        .bubble-avatar.sent-av {
            background: linear-gradient(135deg, #ffd700 0%, #f59e0b 100%);
            color: #111111;
        }

        .message-bubble {
            display: block;
            max-width: 460px;
            width: fit-content;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message-bubble.received {
            background: #ffffff;
            color: #1d1d1f;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .message-bubble.sent {
            background: #ffd700;
            color: #111111;
            border-bottom-right-radius: 4px;
        }

        .bubble-time {
            font-size: 0.7rem;
            color: #aeaeb2;
            margin-top: 0.2rem;
            padding: 0 0.25rem;
        }

        .message-bubble-wrap.sent .bubble-time {
            text-align: right;
        }

        /* ── Date separator ── */
        .date-separator {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.75rem 0;
        }

        .date-separator span {
            font-size: 0.75rem;
            color: #aeaeb2;
            font-weight: 600;
            white-space: nowrap;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e5ea;
        }

        /* ── Typing indicator ── */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0 0.5rem;
        }

        .typing-indicator.visible { display: flex; }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #aeaeb2;
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%           { transform: translateY(-6px); }
        }

        /* ── Composer ── */
        .composer {
            background: #ffffff;
            border-top: 1px solid #e5e5ea;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .composer-textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 22px;
            border: 1px solid #d2d2d7;
            background: #f5f5f7;
            font-size: 0.9rem;
            color: #1d1d1f;
            resize: none;
            min-height: 44px;
            max-height: 140px;
            line-height: 1.5;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            overflow-y: auto;
        }

        .composer-textarea::placeholder { color: #aeaeb2; }

        .composer-textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ffd700;
            border: none;
            cursor: pointer;
            display: grid;
            place-items: center;
            color: #111111;
            flex-shrink: 0;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        .send-btn:hover {
            background: #f5cc00;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(245, 204, 0, 0.4);
        }

        .send-btn:active { transform: scale(0.97); }

        /* ── Empty conversation placeholder ── */
        .conversation-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #aeaeb2;
        }

        .conversation-empty svg { opacity: 0.35; }

        .conversation-empty h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #6e6e73;
        }

        .conversation-empty p { font-size: 0.875rem; }

        /* ── New message button in panel ── */
        .new-msg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 10px;
            background: #ffd700;
            color: #111111;
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: background 0.2s ease;
        }

        .new-msg-btn:hover { background: #f5cc00; }

        /* ── Thread email subtext ── */
        .thread-email {
            font-size: 0.72rem;
            color: #c0c0c8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.05rem;
        }

        /* ── Bubble sender label ── */
        .bubble-sender {
            font-size: 0.72rem;
            font-weight: 600;
            color: #6e6e73;
            margin-bottom: 0.15rem;
            padding: 0 0.25rem;
        }

        .bubble-sender-email {
            font-weight: 400;
            color: #aeaeb2;
        }

        /* ── Staff Picker Modal ── */
        .new-msg-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 600;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
        }

        .new-msg-overlay.open { display: flex; }

        .new-msg-modal {
            background: #ffffff;
            border-radius: 20px;
            width: 100%;
            max-width: 460px;
            margin: 1rem;
            padding: 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }

        .new-msg-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .new-msg-modal-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #1d1d1f;
            margin: 0;
        }

        .new-msg-modal-header button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #6e6e73;
            line-height: 1;
        }

        .staff-search-input {
            width: 100%;
            padding: 0.7rem 1rem;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            background: #f5f5f7;
            font-size: 0.9rem;
            outline: none;
            margin-bottom: 0.75rem;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            box-sizing: border-box;
        }

        .staff-search-input:focus {
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.18);
        }

        .staff-list {
            max-height: 320px;
            overflow-y: auto;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            overflow: hidden;
        }

        .staff-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f7;
            transition: background 0.15s;
        }

        .staff-item:last-child { border-bottom: none; }
        .staff-item:hover { background: #f5f5f7; }

        .staff-item-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #f59e0b);
            display: grid;
            place-items: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: #111;
            flex-shrink: 0;
        }

        .staff-item-info { flex: 1; min-width: 0; }

        .staff-item-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .staff-item-email {
            font-size: 0.75rem;
            color: #aeaeb2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 768px) {
            .thread-panel { width: 260px; }
        }

        @media (max-width: 640px) {
            .app-main.messages-main { flex-direction: column; }
            .thread-panel { width: 100%; height: 240px; border-right: none; border-bottom: 1px solid #e5e5ea; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>
<body>
<!-- Fixed profile button top-right -->
<div id="profileBtn" onclick="window.location.href='staff-profile.html'">
    <div id="sidebarAvatar" style="width:30px;height:30px;border-radius:50%;background:#ffd700;display:grid;place-items:center;font-weight:800;font-size:0.7rem;color:#111;flex-shrink:0;overflow:hidden;">?</div>

</div>
    <div class="app-shell">

        </aside>

        <main class="app-main messages-main">

            <!-- Thread List Panel -->
            <div class="thread-panel">
                <div class="thread-panel-header">
                    <h2>Messages</h2>
                    <div class="thread-search">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

                        <input type="text" id="threadSearch" placeholder="Search conversations…"
                               oninput="filterThreads(this.value)">

                            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>

                        New Message
                    </button>
                </div>
                <div class="thread-list" id="threadList"></div>
            </div>

            <!-- Conversation Panel -->
            <div class="conversation-panel" id="conversationPanel">
                <div class="conversation-empty" id="conversationEmpty">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24"

                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>

                    <p>Choose a thread from the left to view messages.</p>
                </div>

                <!-- Conversation view (hidden until thread selected) -->
                <div id="conversationView" style="display:none;flex-direction:column;height:100%;">
                    <div class="conversation-header">
                        <div class="conversation-header-avatar" id="convAvatar">
                            <div class="online-dot"></div>
                        </div>
                        <div class="conversation-header-info">
                            <h3 id="convName"></h3>
                            <p id="convSubEmail" style="color:#aeaeb2;font-weight:400;font-size:0.75rem;"></p>
                        </div>
                        <div class="conversation-header-actions">
                            <button class="btn btn-secondary" style="font-size:0.775rem;padding:0.4rem 0.875rem;background:#fee2e2;color:#991b1b;border-color:#fca5a5;" onclick="deleteActiveThread()">

                            </button>
                        </div>
                    </div>

                    <div class="messages-area" id="messagesArea"></div>

                    <div class="typing-indicator" id="typingIndicator">
                        <div class="bubble-avatar" id="typingAvatar"></div>
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                    </div>

                    <div class="composer">
                        <textarea class="composer-textarea" id="composerInput"
                                  placeholder="Message…" rows="1"
                                  onkeydown="handleComposerKey(event)"
                                  oninput="autoResizeTextarea(this)"></textarea>
                        <button class="send-btn" onclick="sendMessage()" aria-label="Send">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13"/>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxivCGau_AAvXVPa20svMiZKRmm2IXqk6vT7KL_nmnCcIR8pz2wwUHekONomebDaM0L2w/exec';

        const _sess         = JSON.parse(sessionStorage.getItem('hopics_user') || '{}');
        const CURRENT_EMAIL = _sess.email || '';
        const CURRENT_NAME  = _sess.name  || '';

        let allThreads       = [];
        let activeThreadId   = null;
        let activeThreadData = null;
        let userMap          = {};   // email.toLowerCase() → { name, email, role }
        let allUsers         = [];   // all users except current, for staff picker
        let _cbSeq           = 0;   // unique JSONP callback counter

        // ── JSONP helper with unique callback names ────────────
        // Prevents stale callbacks from a previous load from clobbering a newer one
        function jsonpLoad(url, onSuccess, onError) {
            const cbName = '_gasCb' + (++_cbSeq);
            window[cbName] = function(data) {
                try { delete window[cbName]; } catch(e) {}
                onSuccess(data);
            };
            const s = document.createElement('script');
            s.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
            s.onerror = function() {
                try { delete window[cbName]; } catch(e) {}
                if (onError) onError();
            };
            document.head.appendChild(s);
        }

        // ── Name resolution ────────────────────────────────────
        function nameFor(email) {
            if (!email) return '';
            const u = userMap[(email || '').toLowerCase()];
            return (u && u.name && u.name.trim()) ? u.name.trim() : email;
        }

        function initials(email) {
            if (!email) return '?';
            const n = nameFor(email);
            const str = n.includes('@') ? n.split('@')[0] : n;
            const p = str.trim().split(/[\s._-]+/).filter(Boolean);
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : str.slice(0, 2).toUpperCase();
        }

        function contactEmail(thread) {
            return thread.from === CURRENT_EMAIL ? thread.to : thread.from;
        }

        function formatTime(isoStr) {
            if (!isoStr) return '';
            try {
                const d = new Date(isoStr), now = new Date(), diff = (now - d) / 1000;
                if (diff < 60)     return 'Just now';
                if (diff < 3600)   return Math.floor(diff / 60) + 'm ago';
                if (diff < 86400)  return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                if (diff < 604800) return d.toLocaleDateString('en-US', { weekday: 'short' });
                return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            } catch(e) { return ''; }
        }

        // ── Load users list (for name resolution + staff picker) ─
        function loadUsers(cb) {
            jsonpLoad(
                GOOGLE_SCRIPT_URL + '?action=listUsers',
                function(data) {
                    if (data && data.success && Array.isArray(data.users)) {
                        data.users.forEach(u => {
                            if (u.email) userMap[u.email.toLowerCase()] = u;
                        });
                        allUsers = data.users.filter(u =>
                            u.email && u.email.toLowerCase() !== CURRENT_EMAIL.toLowerCase()
                        );
                    }
                    if (cb) cb();
                },
                function() { if (cb) cb(); }
            );
        }

        // ── Load Threads ──────────────────────────────────────
        function loadThreads() {
            const list = document.getElementById('threadList');
            list.innerHTML = '<div style="padding:2rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">Loading…</div>';

            jsonpLoad(
                GOOGLE_SCRIPT_URL + '?action=getThreads&user=' + encodeURIComponent(CURRENT_EMAIL),
                function(data) {
                    if (data && data.success && Array.isArray(data.threads)) {
                        allThreads = data.threads;
                        renderThreadList(allThreads);
                    } else {
                        list.innerHTML = '<div style="padding:2rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">No conversations yet. Click New Message to start one.</div>';
                    }
                },
                function() {
                    list.innerHTML = '<div style="padding:2rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">Could not load messages.<br><button onclick="loadUsers(function(){loadThreads();})" style="margin-top:0.75rem;padding:0.45rem 1.1rem;background:#ffd700;border:none;border-radius:8px;font-weight:600;color:#111;cursor:pointer;">Retry</button></div>';
                }
            );
        }

        // ── Render Thread List ─────────────────────────────────
        function renderThreadList(threads) {
            const list = document.getElementById('threadList');
            if (!threads || threads.length === 0) {
                list.innerHTML = '<div style="padding:2rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">No conversations yet. Click New Message to start one.</div>';
                return;
            }

            list.innerHTML = threads.map(t => {
                const contact     = contactEmail(t);
                const name        = nameFor(contact);
                const emailSub    = name !== contact ? contact : '';  // show email as subtext only if we resolved a real name
                const isActive    = t.threadId === activeThreadId;
                const unread      = t.unreadCount || 0;
                const unreadBadge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';

                return `
                    <div class="thread-item${isActive ? ' active' : ''}" onclick="selectThread('${escapeHtml(t.threadId)}')">
                        <div class="thread-avatar">${initials(contact)}</div>
                        <div class="thread-info">
                            <div class="thread-name">${escapeHtml(name)}</div>
                            ${emailSub ? `<div class="thread-email">${escapeHtml(emailSub)}</div>` : ''}
                            <div class="thread-preview">${escapeHtml(t.lastMessage || '')}</div>
                        </div>
                        <div class="thread-meta">
                            <span class="thread-time">${formatTime(t.lastTimestamp)}</span>
                            ${unreadBadge}
                        </div>
                    </div>`;
            }).join('');
        }

        // ── Filter threads (search by name or email) ───────────
        function filterThreads(query) {
            if (!query.trim()) { renderThreadList(allThreads); return; }
            const lower = query.toLowerCase();
            renderThreadList(allThreads.filter(t => {
                const contact = contactEmail(t);
                const name    = nameFor(contact);
                return name.toLowerCase().includes(lower) ||
                       contact.toLowerCase().includes(lower) ||
                       (t.lastMessage || '').toLowerCase().includes(lower);
            }));
        }

        // ── Select Thread ──────────────────────────────────────
        function selectThread(threadId) {
            activeThreadId   = threadId;
            activeThreadData = allThreads.find(t => t.threadId === threadId);
            if (activeThreadData) activeThreadData.unreadCount = 0;
            renderThreadList(allThreads);

            document.getElementById('conversationEmpty').style.display = 'none';
            document.getElementById('conversationView').style.display  = 'flex';

            const contact  = activeThreadData ? contactEmail(activeThreadData) : '';
            const name     = nameFor(contact);
            const emailSub = name !== contact ? contact : '';

            const avatar = document.getElementById('convAvatar');
            avatar.className = 'conversation-header-avatar';
            avatar.innerHTML = initials(contact) + '<div class="online-dot"></div>';
            document.getElementById('convName').textContent     = name;
            document.getElementById('convSubEmail').textContent = emailSub;

            loadMessages(threadId);
            document.getElementById('composerInput').focus();
        }

        // ── Load Messages ──────────────────────────────────────
        function loadMessages(threadId) {
            document.getElementById('messagesArea').innerHTML =
                '<div style="margin:auto;text-align:center;color:#aeaeb2;font-size:0.875rem;">Loading…</div>';

            jsonpLoad(
                GOOGLE_SCRIPT_URL + '?action=getMessages&thread=' + encodeURIComponent(threadId),
                function(data) {
                    if (data && data.success && Array.isArray(data.messages)) {
                        renderMessages(data.messages.map(m => ({
                            from: m.from,
                            sent: m.from.toLowerCase() === CURRENT_EMAIL.toLowerCase(),
                            text: m.message,
                            time: formatTime(m.timestamp)
                        })));
                    } else {
                        document.getElementById('messagesArea').innerHTML =
                            '<div style="margin:auto;text-align:center;color:#aeaeb2;font-size:0.875rem;">No messages yet. Say hello!</div>';
                    }
                },
                function() {
                    document.getElementById('messagesArea').innerHTML =
                        '<div style="margin:auto;text-align:center;color:#aeaeb2;font-size:0.875rem;">Could not load messages.</div>';
                }
            );
        }

        // ── Render Messages ────────────────────────────────────
        function renderMessages(messages) {
            const area = document.getElementById('messagesArea');
            if (!messages || messages.length === 0) {
                area.innerHTML = '<div style="margin:auto;text-align:center;color:#aeaeb2;font-size:0.875rem;">No messages yet. Say hello!</div>';
                return;
            }

            area.innerHTML = messages.map(msg => {
                const wrapClass   = msg.sent ? 'message-bubble-wrap sent' : 'message-bubble-wrap';
                const bubbleClass = msg.sent ? 'message-bubble sent' : 'message-bubble received';
                const avClass     = msg.sent ? 'bubble-avatar sent-av' : 'bubble-avatar';
                const timeAlign   = msg.sent ? 'text-align:right;' : '';
                const senderName  = nameFor(msg.from);
                const showSub     = !msg.sent && senderName !== msg.from;  // show email under name for received only

                return `
                    <div class="${wrapClass}">
                        <div class="${avClass}">${initials(msg.from)}</div>
                        <div style="min-width:0;">
                            ${!msg.sent ? `<div class="bubble-sender">${escapeHtml(senderName)}${showSub ? `<span class="bubble-sender-email"> · ${escapeHtml(msg.from)}</span>` : ''}</div>` : ''}
                            <div class="${bubbleClass}">${escapeHtml(msg.text)}</div>
                            <div class="bubble-time" style="${timeAlign}">${msg.time}</div>
                        </div>
                    </div>`;
            }).join('');

            area.scrollTop = area.scrollHeight;
        }

        // ── Send Message ───────────────────────────────────────
        function sendMessage() {
            const input = document.getElementById('composerInput');
            const text  = input.value.trim();
            if (!text || !activeThreadId) return;

            const now    = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const area   = document.getElementById('messagesArea');
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble-wrap sent';
            bubble.innerHTML = `
                <div class="bubble-avatar sent-av">${initials(CURRENT_EMAIL)}</div>
                <div style="min-width:0;">
                    <div class="message-bubble sent">${escapeHtml(text)}</div>
                    <div class="bubble-time" style="text-align:right;">${now}</div>
                </div>`;
            area.appendChild(bubble);
            area.scrollTop = area.scrollHeight;

            if (activeThreadData) {
                activeThreadData.lastMessage   = text;
                activeThreadData.lastTimestamp = new Date().toISOString();
                renderThreadList(allThreads);
            }

            input.value = '';
            input.style.height = '';

            const toEmail = activeThreadData ? contactEmail(activeThreadData) : '';

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode:   'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({
                    action:    'newMessage',
                    threadId:  activeThreadId,
                    from:      CURRENT_EMAIL,
                    to:        toEmail,
                    message:   text
                }).toString()
            }).catch(() => {});
            playChime('send');
        }

        // ── Composer keyboard ──────────────────────────────────
        function handleComposerKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function autoResizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        }

        // ── Staff Picker Modal ─────────────────────────────────
        function startNewMessage() {
            document.getElementById('newMsgOverlay').classList.add('open');
            const si = document.getElementById('staffSearchInput');
            si.value = '';
            setTimeout(() => si.focus(), 50);

            if (allUsers.length > 0) {
                renderStaffList(allUsers);
            } else {
                // Users not loaded yet — fetch now
                document.getElementById('staffPickerList').innerHTML =
                    '<div style="padding:1.25rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">Loading staff…</div>';
                loadUsers(function() {
                    if (allUsers.length > 0) {
                        renderStaffList(allUsers);
                    } else {
                        document.getElementById('staffPickerList').innerHTML =
                            '<div style="padding:1.25rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">Could not load staff list.<br>Make sure users are added in Admin → Users.</div>';
                    }
                });
            }
        }

        function closeNewMsgModal() {
            document.getElementById('newMsgOverlay').classList.remove('open');
        }

        function renderStaffList(users) {
            const list = document.getElementById('staffPickerList');
            if (!users || users.length === 0) {
                list.innerHTML = '<div style="padding:1.25rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">No staff found matching your search.</div>';
                return;
            }
            list.innerHTML = users.map(u => {
                const name = (u.name && u.name.trim()) ? u.name.trim() : u.email;
                const safeEmail = u.email.replace(/'/g, "\\'");
                return `
                    <div class="staff-item" onclick="startDirectMessage('${safeEmail}')">
                        <div class="staff-item-avatar">${initials(u.email)}</div>
                        <div class="staff-item-info">
                            <div class="staff-item-name">${escapeHtml(name)}</div>
                            <div class="staff-item-email">${escapeHtml(u.email)}</div>
                        </div>
                    </div>`;
            }).join('');
        }

        function filterStaff(query) {
            if (!query.trim()) { renderStaffList(allUsers); return; }
            const lower = query.toLowerCase();
            renderStaffList(allUsers.filter(u =>
                (u.name  || '').toLowerCase().includes(lower) ||
                (u.email || '').toLowerCase().includes(lower)
            ));
        }

        function startDirectMessage(toEmail) {
            closeNewMsgModal();
            const threadId = 'DIRECT_' + [CURRENT_EMAIL, toEmail].sort().join('_');
            const existing = allThreads.find(t => t.threadId === threadId);
            if (existing) {
                selectThread(existing.threadId);
            } else {
                const newThread = {
                    threadId,
                    threadType:    'direct',
                    from:          CURRENT_EMAIL,
                    to:            toEmail,
                    lastMessage:   '',
                    lastTimestamp: new Date().toISOString(),
                    unreadCount:   0
                };
                allThreads.unshift(newThread);
                renderThreadList(allThreads);
                selectThread(threadId);
            }
        }

        // ── Delete Thread ──────────────────────────────────────
        function deleteActiveThread() {
            if (!activeThreadId) return;
            const contact = activeThreadData ? contactEmail(activeThreadData) : activeThreadId;
            const name    = nameFor(contact);
            if (!confirm('Delete this entire conversation with ' + name + '? This cannot be undone.')) return;

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ action: 'deleteThread', threadId: activeThreadId, deletedBy: CURRENT_EMAIL }).toString()
            }).catch(() => {});

            // Remove from local list and reset view
            allThreads = allThreads.filter(t => t.threadId !== activeThreadId);
            activeThreadId   = null;
            activeThreadData = null;
            renderThreadList(allThreads);
            document.getElementById('conversationView').style.display  = 'none';
            document.getElementById('conversationEmpty').style.display = 'flex';
            showToast('Conversation deleted');
        }

        // ── Toast notifications ────────────────────────────────
        function showToast(msg, type) {
            let toast = document.getElementById('_toast');
            if (!toast) {
                toast = document.createElement('div');
                toast.id = '_toast';
                toast.style.cssText = 'position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(60px);background:#1c1c1e;color:#f5f5f7;padding:0.7rem 1.4rem;border-radius:30px;font-size:0.875rem;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.25s,transform 0.25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
                document.body.appendChild(toast);
            }
            toast.textContent = msg;
            toast.style.background = type === 'error' ? '#991b1b' : '#1c1c1e';
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(function() {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(60px)';
            }, 3000);
        }

        // ── Utility ───────────────────────────────────────────
        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ── Init ──────────────────────────────────────────────
        if (_sess.role === 'admin' || _sess.role === 'supervisor') {
            const al = document.getElementById('adminLink');
            if (al) al.style.display = 'flex';
        }

        if (!CURRENT_EMAIL) {
            window.location.replace('login.html');
        } else {
            // Load users first (for name resolution), then threads
            loadUsers(function() {
                loadThreads();
            });
        }
    </script>

    <!-- Staff Picker Modal -->
    <div id="newMsgOverlay" class="new-msg-overlay" onclick="if(event.target===this)closeNewMsgModal()">
        <div class="new-msg-modal">
            <div class="new-msg-modal-header">
                <h3>New Message</h3>
                <button onclick="closeNewMsgModal()">✕</button>
            </div>
            <input type="text" id="staffSearchInput" class="staff-search-input"
                   placeholder="Search staff by name or email…"
                   oninput="filterStaff(this.value)" autocomplete="off">
            <div class="staff-list" id="staffPickerList">
                <div style="padding:1rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">Loading staff…</div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profileModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);" onclick="if(event.target===this)closeProfileModal()">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#1c1c1e;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2rem;width:100%;max-width:400px;margin:1rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;">
                <h3 style="color:#f5f5f7;font-size:1.1rem;font-weight:700;margin:0;">My Profile</h3>
                <button onclick="closeProfileModal()" style="background:none;border:none;color:#6e6e73;cursor:pointer;font-size:1.2rem;">✕</button>
            </div>
            <!-- Avatar + identity -->
            <div style="display:flex;flex-direction:column;align-items:center;margin-bottom:1.25rem;gap:0.5rem;">
                <div id="profileAvatar" style="width:80px;height:80px;border-radius:50%;background:#ffd700;display:grid;place-items:center;font-weight:800;font-size:1.6rem;color:#111;overflow:hidden;margin-bottom:0.25rem;"></div>
                <div id="profileName" style="color:#f5f5f7;font-size:1.15rem;font-weight:700;"></div>
                <div id="profileEmail" style="color:#aeaeb2;font-size:0.82rem;"></div>
                <div id="profileRole" style="background:rgba(255,215,0,0.12);color:#ffd700;font-size:0.75rem;font-weight:600;text-transform:capitalize;padding:0.2rem 0.75rem;border-radius:20px;border:1px solid rgba(255,215,0,0.25);"></div>
                <label style="font-size:0.75rem;color:#6e6e73;cursor:pointer;margin-top:0.25rem;">
                    <input type="file" id="photoUpload" accept="image/*" style="display:none;" onchange="handlePhotoUpload(this)">
                    Change Photo
                </label>
            </div>
            <div style="height:1px;background:rgba(255,255,255,0.08);margin-bottom:1.25rem;"></div>
            <button onclick="signOut()" style="margin-top:1.5rem;width:100%;padding:0.75rem;border-radius:10px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.1);color:#fca5a5;font-size:0.875rem;font-weight:600;cursor:pointer;">Sign Out</button>
        </div>
    </div>

    <script>
    (function initProfileWidget() {
        const sess = JSON.parse(sessionStorage.getItem('hopics_user') || '{}');
        if (!sess.email) return;

        function getInitials(name) {
            if (!name) return '?';
            const p = name.trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
        }

        const savedPhoto = localStorage.getItem('hopics_profile_photo_' + sess.email);
        const avatarContent = savedPhoto
            ? `<img src="${savedPhoto}" style="width:100%;height:100%;object-fit:cover;">`
            : getInitials(sess.name || sess.email);

        const sidebarAv = document.getElementById('sidebarAvatar');
        const sidebarNm = document.getElementById('sidebarName');
        const sidebarRl = document.getElementById('sidebarRole');
        if (sidebarAv) { sidebarAv.innerHTML = avatarContent; if (savedPhoto) sidebarAv.style.background = 'transparent'; }
        if (sidebarNm) sidebarNm.textContent = sess.name || sess.email;
        if (sidebarRl) sidebarRl.textContent = (sess.role || '').replace(/_/g, ' ');
    })();

    function openProfileModal() {
        const sess = JSON.parse(sessionStorage.getItem('hopics_user') || '{}');
        function getInitials(name) {
            if (!name) return '?';
            const p = name.trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
        }
        const savedPhoto = localStorage.getItem('hopics_profile_photo_' + sess.email);
        const avEl = document.getElementById('profileAvatar');
        if (avEl) {
            avEl.innerHTML = savedPhoto ? `<img src="${savedPhoto}" style="width:100%;height:100%;object-fit:cover;">` : getInitials(sess.name || sess.email);
            avEl.style.background = savedPhoto ? 'transparent' : '#ffd700';
        }
        const nm = document.getElementById('profileName');   if (nm) nm.textContent  = sess.name  || '—';
        const em = document.getElementById('profileEmail');  if (em) em.textContent  = sess.email || '—';
        const rl = document.getElementById('profileRole');   if (rl) rl.textContent  = (sess.role || '').replace(/_/g, ' ');
        document.getElementById('profileModal').style.display = 'block';
    }

    function closeProfileModal() {
        document.getElementById('profileModal').style.display = 'none';
    }

    function handlePhotoUpload(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const dataUrl = e.target.result;
            const sess = JSON.parse(sessionStorage.getItem('hopics_user') || '{}');
            localStorage.setItem('hopics_profile_photo_' + sess.email, dataUrl);
            // Update avatar everywhere
            const img = `<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
            const avEl = document.getElementById('profileAvatar');
            if (avEl) { avEl.innerHTML = img; avEl.style.background = 'transparent'; }
            const sbAv = document.getElementById('sidebarAvatar');
            if (sbAv) { sbAv.innerHTML = img; sbAv.style.background = 'transparent'; }
        };
        reader.readAsDataURL(file);
    }
