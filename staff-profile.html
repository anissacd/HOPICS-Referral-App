<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPICS — My Profile</title>
    <link rel="stylesheet" href="styles.css">
    <script src="hopics-utils.js"></script>
    <style>
        .profile-page-wrap {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 1.5rem;
            background: #f5f5f7;
        }

        .profile-page-card {
            width: 100%;
            max-width: 560px;
            background: #fff;
            border-radius: 24px;
            box-shadow: 0 4px 32px rgba(0,0,0,0.08);
            overflow: hidden;
        }

        .profile-banner {
            background: linear-gradient(135deg, #1c1c1e 0%, #2c2c2e 100%);
            padding: 2.5rem 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            position: relative;
        }

        .profile-back-btn {
            position: absolute;
            top: 1.25rem;
            left: 1.25rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            color: #f5f5f7;
            font-size: 0.825rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
            transition: background .2s;
        }
        .profile-back-btn:hover { background: rgba(255,255,255,0.18); }

        .profile-avatar-large {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            background: #ffd700;
            display: grid;
            place-items: center;
            font-size: 2rem;
            font-weight: 800;
            color: #111;
            overflow: hidden;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            position: relative;
        }

        .profile-avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            place-items: center;
            border-radius: 50%;
            font-size: 0.7rem;
            color: #fff;
            font-weight: 600;
            text-align: center;
        }
        .profile-avatar-large:hover .profile-avatar-overlay { display: grid; }

        .profile-name-large {
            font-size: 1.4rem;
            font-weight: 700;
            color: #f5f5f7;
            text-align: center;
        }
        .profile-email-large {
            font-size: 0.875rem;
            color: #aeaeb2;
        }
        .profile-role-pill {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 99px;
            padding: 0.2rem 0.875rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .profile-details {
            padding: 1.75rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .detail-row {
            display: flex;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #f5f5f7;
            gap: 1rem;
        }
        .detail-row:last-child { border-bottom: none; }

        .detail-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: #f5f5f7;
            display: grid;
            place-items: center;
            flex-shrink: 0;
            color: #6e6e73;
        }

        .detail-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #aeaeb2;
            text-transform: uppercase;
            letter-spacing: .05em;
            margin-bottom: .15rem;
        }
        .detail-value {
            font-size: 0.925rem;
            font-weight: 500;
            color: #1d1d1f;
        }
        .detail-value.empty { color: #aeaeb2; font-style: italic; }

        .detail-edit-input {
            display: none;
            width: 100%;
            padding: .5rem .75rem;
            border-radius: 8px;
            border: 1px solid #d2d2d7;
            font-size: .9rem;
            background: #f5f5f7;
            color: #1d1d1f;
            margin-top: .25rem;
        }
        .detail-edit-input:focus { outline: none; border-color: #ffd700; background: #fff; }

        .editing-profile .detail-value { display: none; }
        .editing-profile .detail-edit-input { display: block; }

        .profile-actions {
            padding: 1.5rem 2rem;
            border-top: 1px solid #f5f5f7;
            display: flex;
            flex-direction: column;
            gap: .75rem;
        }

        .btn-signout {
            width: 100%;
            padding: .875rem;
            border-radius: 12px;
            border: 1px solid rgba(239,68,68,.3);
            background: rgba(239,68,68,.08);
            color: #ef4444;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .2s;
        }
        .btn-signout:hover { background: rgba(239,68,68,.15); }

        @media (max-width: 600px) {
            .profile-page-wrap { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body style="background:#f5f5f7;margin:0;">

    <div class="profile-page-wrap">
        <div class="profile-page-card">
            <!-- Banner -->
            <div class="profile-banner">
                <a class="profile-back-btn" onclick="history.back()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Back
                </a>

                <div class="profile-avatar-large" id="profileAvatar" onclick="document.getElementById('photoUpload').click()">
                    <input type="file" id="photoUpload" accept="image/*" style="display:none;" onchange="handlePhotoUpload(this)">
                    <div class="profile-avatar-overlay">Change Photo</div>
                </div>

                <div class="profile-name-large" id="profileName">—</div>
                <div class="profile-email-large" id="profileEmail">—</div>
                <div class="profile-role-pill" id="profileRole">—</div>
            </div>

            <!-- Detail rows -->
            <div class="profile-details" id="detailSection">
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </div>
                    <div style="flex:1;">
                        <div class="detail-label">Full Name</div>
                        <div class="detail-value" id="dName">—</div>
                        <input class="detail-edit-input" id="editName" type="text" placeholder="Your full name">
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.18 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6.29 6.29l.75-.75a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    </div>
                    <div style="flex:1;">
                        <div class="detail-label">Phone</div>
                        <div class="detail-value empty" id="dPhone">Not provided</div>
                        <input class="detail-edit-input" id="editPhone" type="tel" placeholder="Phone number">
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    </div>
                    <div style="flex:1;">
                        <div class="detail-label">Assigned Program</div>
                        <div class="detail-value empty" id="dProgram">Not assigned</div>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <div style="flex:1;">
                        <div class="detail-label">Role</div>
                        <div class="detail-value" id="dRole">—</div>
                    </div>
                </div>
                <div class="detail-row">
                    <div class="detail-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    </div>
                    <div style="flex:1;">
                        <div class="detail-label">Email</div>
                        <div class="detail-value" id="dEmail">—</div>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="profile-actions">
                <div style="display:flex;gap:.75rem;" id="viewActions">
                    <button class="btn btn-secondary" style="flex:1;" onclick="enterEditMode()">Edit Profile</button>
                </div>
                <div style="display:none;gap:.75rem;" id="editActions">
                    <button class="btn btn-secondary" style="flex:1;" onclick="cancelEdit()">Cancel</button>
                    <button class="btn btn-primary" style="flex:1;" onclick="saveProfile()">Save Changes</button>
                </div>
                <button class="btn-signout" onclick="signOut()">Sign Out</button>
            </div>
        </div>
    </div>

    <script>
        const _sess = JSON.parse(sessionStorage.getItem('hopics_user') || '{}');
        if (!_sess.email) window.location.replace('login.html');

        function getInitials(name) {
            if (!name) return '?';
            const p = name.trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length-1][0]).toUpperCase() : name.slice(0,2).toUpperCase();
        }

        function renderProfile() {
            const name    = _sess.name  || '';
            const email   = _sess.email || '';
            const role    = (_sess.role || '').replace(/_/g, ' ');
            const program = _sess.program || '';
            const phone   = localStorage.getItem('hopics_phone_' + email) || '';
            const photo   = localStorage.getItem('hopics_profile_photo_' + email);

            const avEl = document.getElementById('profileAvatar');
            if (avEl) {
                // preserve the file input and overlay, just update inner content
                const fileInput = avEl.querySelector('input');
                const overlay   = avEl.querySelector('.profile-avatar-overlay');
                avEl.innerHTML = '';
                if (photo) {
                    const img = document.createElement('img');
                    img.src = photo;
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
                    avEl.appendChild(img);
                    avEl.style.background = 'transparent';
                } else {
                    avEl.textContent = getInitials(name || email);
                }
                if (fileInput) avEl.appendChild(fileInput);
                if (overlay)   avEl.appendChild(overlay);
            }

            document.getElementById('profileName').textContent  = name || '—';
            document.getElementById('profileEmail').textContent = email;
            document.getElementById('profileRole').textContent  = role || '—';

            document.getElementById('dName').textContent    = name || '—';
            document.getElementById('editName').value       = name;
            document.getElementById('dEmail').textContent   = email;
            document.getElementById('dRole').textContent    = role || '—';

            const phoneEl = document.getElementById('dPhone');
            if (phone) { phoneEl.textContent = phone; phoneEl.classList.remove('empty'); }
            document.getElementById('editPhone').value = phone;

            const progEl = document.getElementById('dProgram');
            if (program) { progEl.textContent = program; progEl.classList.remove('empty'); }
        }

        renderProfile();

        function enterEditMode() {
            document.getElementById('detailSection').classList.add('editing-profile');
            document.getElementById('viewActions').style.display = 'none';
            document.getElementById('editActions').style.display = 'flex';
        }
        function cancelEdit() {
            document.getElementById('detailSection').classList.remove('editing-profile');
            document.getElementById('viewActions').style.display = 'flex';
            document.getElementById('editActions').style.display = 'none';
        }
        function saveProfile() {
            const newName  = document.getElementById('editName').value.trim();
            const newPhone = document.getElementById('editPhone').value.trim();
            if (newName) {
                _sess.name = newName;
                sessionStorage.setItem('hopics_user', JSON.stringify(_sess));
            }
            if (newPhone) localStorage.setItem('hopics_phone_' + _sess.email, newPhone);
            cancelEdit();
            renderProfile();
            showToast('Profile updated', 'success');
            playChime('success');
        }

        function handlePhotoUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem('hopics_profile_photo_' + _sess.email, e.target.result);
                renderProfile();
                showToast('Photo updated', 'success');
            };
            reader.readAsDataURL(file);
        }

        function signOut() {
            sessionStorage.removeItem('hopics_user');
            window.location.replace('login.html');
        }
    </script>
</body>
</html>
