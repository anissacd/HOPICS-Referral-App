<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPICS — Messages</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Override app-main padding for messages layout ── */
        .app-main.messages-main {
            padding: 0;
            display: flex;
            overflow: hidden;
            height: 100vh;
        }

        /* ── Thread List Panel ── */
        .thread-panel {
            width: 320px;
            flex-shrink: 0;
            border-right: 1px solid #e5e5ea;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .thread-panel-header {
            padding: 1.5rem 1.25rem 1rem;
            border-bottom: 1px solid #f5f5f7;
            flex-shrink: 0;
        }

        .thread-panel-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 0.875rem;
        }

        .thread-search {
            position: relative;
        }

        .thread-search svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: #aeaeb2;
            pointer-events: none;
        }

        .thread-search input {
            width: 100%;
            padding: 0.6rem 0.875rem 0.6rem 2.25rem;
            border-radius: 10px;
            border: 1px solid #d2d2d7;
            background: #f5f5f7;
            font-size: 0.875rem;
            color: #1d1d1f;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .thread-search input::placeholder { color: #aeaeb2; }

        .thread-search input:focus {
            outline: none;
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .thread-list {
            flex: 1;
            overflow-y: auto;
        }

        .thread-item {
            display: flex;
            align-items: center;
            gap: 0.875rem;
            padding: 0.875rem 1.25rem;
            cursor: pointer;
            border-bottom: 1px solid #f5f5f7;
            transition: background 0.15s ease;
            position: relative;
        }

        .thread-item:hover { background: #f5f5f7; }

        .thread-item.active {
            background: #fff8e1;
            border-left: 3px solid #ffd700;
        }

        .thread-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #f59e0b 100%);
            display: grid;
            place-items: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #111111;
            flex-shrink: 0;
            letter-spacing: -0.02em;
        }

        .thread-avatar.group {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: #ffffff;
        }

        .thread-info { flex: 1; min-width: 0; }

        .thread-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1d1d1f;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .thread-preview {
            font-size: 0.8rem;
            color: #aeaeb2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.2rem;
        }

        .thread-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .thread-time {
            font-size: 0.75rem;
            color: #aeaeb2;
            white-space: nowrap;
        }

        .unread-badge {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffd700;
            color: #111111;
            font-size: 0.65rem;
            font-weight: 800;
            display: grid;
            place-items: center;
        }

        /* ── Conversation Panel ── */
        .conversation-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #f5f5f7;
            min-width: 0;
        }

        .conversation-header {
            background: #ffffff;
            border-bottom: 1px solid #e5e5ea;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }

        .conversation-header-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #f59e0b 100%);
            display: grid;
            place-items: center;
            font-size: 0.8rem;
            font-weight: 800;
            color: #111111;
            flex-shrink: 0;
            position: relative;
        }

        .conversation-header-avatar.group {
            background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
            color: #ffffff;
        }

        .online-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            border: 2px solid #ffffff;
            position: absolute;
            bottom: 0;
            right: 0;
        }

        .conversation-header-info h3 {
            font-size: 0.975rem;
            font-weight: 700;
            color: #1d1d1f;
        }

        .conversation-header-info p {
            font-size: 0.775rem;
            color: #22c55e;
            font-weight: 500;
        }

        .conversation-header-actions {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }

        /* ── Messages Area ── */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message-group {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .message-bubble-wrap {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
        }

        .message-bubble-wrap.sent {
            flex-direction: row-reverse;
        }

        .bubble-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e5e5ea 0%, #d2d2d7 100%);
            display: grid;
            place-items: center;
            font-size: 0.65rem;
            font-weight: 800;
            color: #6e6e73;
            flex-shrink: 0;
        }

        .bubble-avatar.sent-av {
            background: linear-gradient(135deg, #ffd700 0%, #f59e0b 100%);
            color: #111111;
        }

        .message-bubble {
            max-width: 70%;
            padding: 0.75rem 1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
            word-break: break-word;
        }

        .message-bubble.received {
            background: #ffffff;
            color: #1d1d1f;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .message-bubble.sent {
            background: #ffd700;
            color: #111111;
            border-bottom-right-radius: 4px;
        }

        .bubble-time {
            font-size: 0.7rem;
            color: #aeaeb2;
            margin-top: 0.2rem;
            padding: 0 0.25rem;
        }

        .message-bubble-wrap.sent .bubble-time {
            text-align: right;
        }

        /* ── Date separator ── */
        .date-separator {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0.75rem 0;
        }

        .date-separator span {
            font-size: 0.75rem;
            color: #aeaeb2;
            font-weight: 600;
            white-space: nowrap;
        }

        .date-separator::before,
        .date-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e5ea;
        }

        /* ── Typing indicator ── */
        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 0 0.5rem;
        }

        .typing-indicator.visible { display: flex; }

        .typing-dots {
            display: flex;
            gap: 4px;
            padding: 0.75rem 1rem;
            background: #ffffff;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.06);
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #aeaeb2;
            animation: typingBounce 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30%           { transform: translateY(-6px); }
        }

        /* ── Composer ── */
        .composer {
            background: #ffffff;
            border-top: 1px solid #e5e5ea;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: flex-end;
            gap: 0.75rem;
            flex-shrink: 0;
        }

        .composer-textarea {
            flex: 1;
            padding: 0.75rem 1rem;
            border-radius: 22px;
            border: 1px solid #d2d2d7;
            background: #f5f5f7;
            font-size: 0.9rem;
            color: #1d1d1f;
            resize: none;
            min-height: 44px;
            max-height: 140px;
            line-height: 1.5;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            overflow-y: auto;
        }

        .composer-textarea::placeholder { color: #aeaeb2; }

        .composer-textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #ffd700;
            border: none;
            cursor: pointer;
            display: grid;
            place-items: center;
            color: #111111;
            flex-shrink: 0;
            transition: background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
        }

        .send-btn:hover {
            background: #f5cc00;
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(245, 204, 0, 0.4);
        }

        .send-btn:active { transform: scale(0.97); }

        /* ── Empty conversation placeholder ── */
        .conversation-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            color: #aeaeb2;
        }

        .conversation-empty svg { opacity: 0.35; }

        .conversation-empty h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #6e6e73;
        }

        .conversation-empty p { font-size: 0.875rem; }

        /* ── New message button in panel ── */
        .new-msg-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 10px;
            background: #ffd700;
            color: #111111;
            border: none;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.75rem;
            transition: background 0.2s ease;
        }

        .new-msg-btn:hover { background: #f5cc00; }

        @media (max-width: 768px) {
            .thread-panel { width: 260px; }
        }

        @media (max-width: 640px) {
            .app-main.messages-main { flex-direction: column; }
            .thread-panel { width: 100%; height: 240px; border-right: none; border-bottom: 1px solid #e5e5ea; }
            .message-bubble { max-width: 85%; }
        }
    </style>
</head>

                { from: 'ashley',       sent: true,  text: 'I can check with Rapid Rehousing — they might have overflow beds.', time: 'Mon 9:01 AM' },
                { from: 'marcus',       sent: false, text: 'Confirmed — 3 beds opened at Rapid Rehousing as of yesterday.', time: 'Mon 9:14 AM' },
                { from: 'housing-team', sent: false, text: 'Shelter capacity update — 6 beds available across all programs.', time: 'Mon 11:20 AM' },
            ],
            T005: [
                { from: 'supervisor', sent: false, text: 'Hi Ashley, just a reminder that weekly referral stats are due by Friday EOD.', time: 'Last week Thu 4:00 PM' },
                { from: 'ashley',     sent: true,  text: 'Got it! I\'ll have them submitted by Thursday to give some buffer.', time: 'Last week Thu 4:15 PM' },
                { from: 'supervisor', sent: false, text: 'Please send weekly stats by Friday.', time: 'Last week Thu 4:20 PM' },
            ],
        };

        let allThreads       = [...MOCK_THREADS];
        let activeThreadId   = null;
        let activeThreadData = null;

        // ── Helpers ───────────────────────────────────────────
        function initials(name) {
            const p = name.trim().split(' ');
            return p.length >= 2 ? (p[0][0] + p[p.length - 1][0]).toUpperCase() : name.slice(0, 2).toUpperCase();
        }

        function contactInitials(contactId) {
            const labels = {
                ashley:       'AR', carlos: 'CM', elena: 'EV', marcus: 'MD',
                supervisor:   'SV', 'housing-team': 'HT'
            };
            return labels[contactId] || contactId.slice(0, 2).toUpperCase();
        }

        // ── Render Thread List ─────────────────────────────────
        function renderThreadList(threads) {
            const list = document.getElementById('threadList');
            if (threads.length === 0) {
                list.innerHTML = '<div style="padding:2rem 1.25rem;text-align:center;color:#aeaeb2;font-size:0.875rem;">No conversations found.</div>';
                return;
            }

            list.innerHTML = threads.map(t => {
                const isGroup   = t.type === 'group';
                const isActive  = t.threadId === activeThreadId;
                const avClass   = isGroup ? 'thread-avatar group' : 'thread-avatar';
                const avText    = isGroup ? '👥' : contactInitials(t.contact);
                const unreadBadge = t.unread > 0
                    ? `<span class="unread-badge">${t.unread}</span>` : '';

                return `
                    <div class="thread-item${isActive ? ' active' : ''}"
                         onclick="selectThread('${t.threadId}')">
                        <div class="${avClass}" ${isGroup ? 'style="font-size:1rem;"' : ''}>${isGroup ? '👥' : avText}</div>
                        <div class="thread-info">
                            <div class="thread-name">${t.label}</div>
                            <div class="thread-preview">${t.lastMsg}</div>
                        </div>
                        <div class="thread-meta">
                            <span class="thread-time">${t.lastTime}</span>
                            ${unreadBadge}
                        </div>
                    </div>`;
            }).join('');
        }

        // ── Filter threads ─────────────────────────────────────
        function filterThreads(query) {
            if (!query.trim()) {
                renderThreadList(allThreads);
                return;
            }
            const lower = query.toLowerCase();
            const filtered = allThreads.filter(t =>
                t.label.toLowerCase().includes(lower) ||
                t.lastMsg.toLowerCase().includes(lower)
            );
            renderThreadList(filtered);
        }

        // ── Select Thread ──────────────────────────────────────
        function selectThread(threadId) {
            activeThreadId   = threadId;
            activeThreadData = allThreads.find(t => t.threadId === threadId);

            // Clear unread
            if (activeThreadData) activeThreadData.unread = 0;

            // Re-render thread list to update active/unread state
            renderThreadList(allThreads);

            // Show conversation view
            document.getElementById('conversationEmpty').style.display  = 'none';
            const convView = document.getElementById('conversationView');
            convView.style.display = 'flex';

            // Update header
            const isGroup  = activeThreadData.type === 'group';
            const avatar   = document.getElementById('convAvatar');
            avatar.className = 'conversation-header-avatar' + (isGroup ? ' group' : '');
            avatar.innerHTML = (isGroup ? '👥' : contactInitials(activeThreadData.contact))
                + '<div class="online-dot"></div>';
            document.getElementById('convName').textContent = activeThreadData.label;

            // Load messages
            loadMessages(threadId);

            // Focus composer
            document.getElementById('composerInput').focus();
        }

        // ── Load Messages ──────────────────────────────────────
        function loadMessages(threadId) {
            // Try JSONP from Google Sheets, fall back to mock
            const mockData = MOCK_CONVERSATIONS[threadId] || [];
            renderMessages(mockData, activeThreadData);

            // JSONP attempt (fire and forget; mock will already be shown)
            const script = document.createElement('script');
            script.src = GOOGLE_SCRIPT_URL + '?action=getMessages&thread=' + encodeURIComponent(threadId) + '&callback=onMessagesLoaded';
            script.onerror = () => script.remove();
            document.body.appendChild(script);
        }

        // JSONP callback
        function onMessagesLoaded(data) {
            if (data && data.success && Array.isArray(data.messages) && data.messages.length > 0) {
                const mapped = data.messages.map(m => ({
                    from: m.from,
                    sent: m.from === CURRENT_USER,
                    text: m.message,
                    time: new Date(m.timestamp).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })
                }));
                renderMessages(mapped, activeThreadData);
            }
        }

        // ── Render Messages ────────────────────────────────────
        function renderMessages(messages, thread) {
            const area = document.getElementById('messagesArea');
            if (!messages || messages.length === 0) {
                area.innerHTML = '<div style="margin:auto;text-align:center;color:#aeaeb2;font-size:0.875rem;">No messages yet. Say hello!</div>';
                return;
            }

            let html = '<div class="date-separator"><span>Today</span></div>';

            messages.forEach(msg => {
                const wrapClass = msg.sent ? 'message-bubble-wrap sent' : 'message-bubble-wrap';
                const bubbleClass = msg.sent ? 'message-bubble sent' : 'message-bubble received';
                const avClass    = msg.sent ? 'bubble-avatar sent-av' : 'bubble-avatar';
                const avText     = msg.sent ? contactInitials(CURRENT_USER) : contactInitials(msg.from);
                const timeAlign  = msg.sent ? 'text-align:right;' : '';

                html += `
                    <div class="${wrapClass}">
                        <div class="${avClass}">${avText}</div>
                        <div>
                            <div class="${bubbleClass}">${escapeHtml(msg.text)}</div>
                            <div class="bubble-time" style="${timeAlign}">${msg.time}</div>
                        </div>
                    </div>`;
            });

            area.innerHTML = html;
            area.scrollTop = area.scrollHeight;
        }

        // ── Send Message ───────────────────────────────────────
        function sendMessage() {
            const input = document.getElementById('composerInput');
            const text  = input.value.trim();
            if (!text || !activeThreadId) return;

            // Optimistic UI update
            const area = document.getElementById('messagesArea');
            const now  = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble-wrap sent';
            bubble.innerHTML = `
                <div class="bubble-avatar sent-av">${contactInitials(CURRENT_USER)}</div>
                <div>
                    <div class="message-bubble sent">${escapeHtml(text)}</div>
                    <div class="bubble-time" style="text-align:right;">${now}</div>
                </div>`;
            area.appendChild(bubble);
            area.scrollTop = area.scrollHeight;

            // Update thread preview
            if (activeThreadData) {
                activeThreadData.lastMsg  = text;
                activeThreadData.lastTime = 'Just now';
                renderThreadList(allThreads);
            }

            // Clear input
            input.value = '';
            input.style.height = '';

            // Simulate typing response after short delay (for demo)
            simulateTyping();

            // POST to Google Sheets (fire-and-forget, no-cors)
            fetch(GOOGLE_SCRIPT_URL, {
                method:  'POST',
                mode:    'no-cors',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body:    new URLSearchParams({
                    action:   'newMessage',
                    threadId: activeThreadId,
                    from:     CURRENT_USER,
                    to:       activeThreadData ? activeThreadData.contact : '',
                    message:  text
                }).toString()
            }).catch(() => {}); // Ignore CORS errors — fire and forget
        }

        // ── Simulate typing indicator (demo) ──────────────────
        function simulateTyping() {
            if (!activeThreadData || activeThreadData.type === 'group') return;
            const indicator = document.getElementById('typingIndicator');
            const avEl      = document.getElementById('typingAvatar');
            avEl.textContent = contactInitials(activeThreadData.contact);
            indicator.classList.add('visible');
            setTimeout(() => indicator.classList.remove('visible'), 2200);
        }

        // ── Composer keyboard handler ──────────────────────────
        function handleComposerKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function autoResizeTextarea(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 140) + 'px';
        }

        // ── Start new message (stub) ───────────────────────────
        function startNewMessage() {
            alert('Select a contact from the list to start a conversation.');
        }

        // ── Utility ───────────────────────────────────────────
        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        // ── Init ──────────────────────────────────────────────
        renderThreadList(allThreads);

        // Show admin link if user is admin
        const _sess = JSON.parse(sessionStorage.getItem('hopics_user') || '{}');
        if (_sess.role === 'admin') {
            const al = document.getElementById('adminLink');
            if (al) al.style.display = 'flex';
        }
    </script>
</body>
</html>
