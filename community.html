<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOPICS — Staff Hub</title>
    <link rel="stylesheet" href="styles.css">
    <script src="hopics-utils.js"></script>
    <style>
        /* ── Community / Staff Hub layout ── */
        .community-main {
            padding: 0;
            display: flex;
            flex-direction: column;
            background: #f0f2f5;
            overflow-y: auto;
            height: 100vh;
        }

        /* ── Top Bar ── */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: #ffffff;
            border-bottom: 1px solid #e5e5ea;
            padding: 0 2rem;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .top-bar-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.015em;
        }

        .top-bar-user {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .top-bar-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffd700;
        }

        .top-bar-initials {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg,#ffd700,#e07a00);
            color: #111;
            font-weight: 800;
            font-size: 0.75rem;
            display: none;
            place-items: center;
        }

        .top-bar-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: #1d1d1f;
        }

        /* ── Community body: feed + discover ── */
        .community-body {
            flex: 1;
            display: flex;
            gap: 1.5rem;
            padding: 1.5rem 1.25rem 3rem;
            max-width: 1080px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* ── Feed column ── */
        .feed-col {
            flex: 1;
            min-width: 0;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* ── Discover column ── */
        .discover-panel {
            width: 260px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            position: sticky;
            top: 72px;
            height: fit-content;
        }

        .discover-card {
            background: #fff;
            border-radius: 16px;
            padding: 1.125rem 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .discover-title {
            font-size: 0.875rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 0.875rem;
            letter-spacing: -0.01em;
        }

        .discover-staff-item {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            padding: 0.4rem 0;
        }

        .discover-staff-av {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg,#ffd700,#e07a00);
            display: grid;
            place-items: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: #111;
            flex-shrink: 0;
        }

        .discover-staff-name {
            font-size: 0.82rem;
            font-weight: 600;
            color: #1d1d1f;
        }

        .discover-staff-prog {
            font-size: 0.72rem;
            color: #aeaeb2;
        }

        .trending-tag {
            display: inline-flex;
            align-items: center;
            background: #f0f9ff;
            color: #0369a1;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 0.25rem 0.7rem;
            border-radius: 99px;
            margin: 0.2rem 0.2rem 0 0;
            cursor: pointer;
            transition: background 0.15s;
        }

        .trending-tag:hover { background: #e0f2fe; }

        @media (max-width: 900px) {
            .discover-panel { display: none; }
            .feed-col { max-width: 100%; }
        }

        /* ── Compose card ── */
        .compose-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 1.125rem 1.25rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        .compose-top {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .compose-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffd700;
            flex-shrink: 0;
        }

        .compose-avatar-initials {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffd700;
            color: #111;
            font-weight: 800;
            font-size: 0.85rem;
            display: none;
            place-items: center;
            flex-shrink: 0;
        }

        .compose-textarea {
            flex: 1;
            border: 1px solid #e5e5ea;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 0.925rem;
            color: #1d1d1f;
            background: #f5f5f7;
            resize: none;
            min-height: 72px;
            line-height: 1.6;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            width: 100%;
        }

        .compose-textarea::placeholder { color: #aeaeb2; }

        .compose-textarea:focus {
            outline: none;
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .compose-extras {
            margin-top: 0.875rem;
            padding-top: 0.875rem;
            border-top: 1px solid #f5f5f7;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .compose-field-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .compose-field-icon {
            color: #aeaeb2;
            flex-shrink: 0;
            width: 16px;
        }

        .compose-input {
            flex: 1;
            border: 1px solid #e5e5ea;
            border-radius: 8px;
            padding: 0.5rem 0.75rem;
            font-size: 0.85rem;
            background: #f5f5f7;
            color: #1d1d1f;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .compose-input::placeholder { color: #aeaeb2; }

        .compose-input:focus {
            outline: none;
            border-color: #ffd700;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .compose-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 0.875rem;
        }

        .compose-toggle-img {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
            color: #6e6e73;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.6rem;
            border-radius: 8px;
            transition: background 0.2s, color 0.2s;
        }

        .compose-toggle-img:hover {
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .compose-image-row {
            display: none;
        }

        .compose-image-row.open {
            display: flex;
        }

        .post-btn {
            padding: 0.55rem 1.25rem;
            border-radius: 10px;
            border: none;
            background: #ffd700;
            color: #111;
            font-weight: 700;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s, transform 0.15s;
        }

        .post-btn:hover {
            background: #f5cc00;
            box-shadow: 0 6px 18px rgba(245, 204, 0, 0.4);
            transform: translateY(-1px);
        }

        .post-btn:active { transform: translateY(0); }

        .post-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ── Post Card ── */
        .post-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
            overflow: hidden;
            transition: box-shadow 0.2s ease;
            animation: fadeSlideIn 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .post-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

        /* Inner flex: content + side actions */
        .post-inner {
            display: flex;
            gap: 0;
            padding: 1.125rem 1.25rem 0.875rem;
        }

        /* Left: avatar column */
        .post-avatar-col {
            flex-shrink: 0;
            margin-right: 0.875rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .post-avatar {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 2.5px solid #ffd700;
            flex-shrink: 0;
        }

        .post-avatar-initials {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #e07a00);
            color: #111;
            font-weight: 800;
            font-size: 0.875rem;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        /* Center: main post content */
        .post-main-col {
            flex: 1;
            min-width: 0;
        }

        .post-meta { margin-bottom: 0.35rem; }

        .post-author-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .post-author-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1d1d1f;
        }

        .post-author-handle {
            font-size: 0.8rem;
            color: #aeaeb2;
            font-weight: 400;
        }

        .post-program-badge {
            font-size: 0.68rem;
            font-weight: 600;
            background: #fff8e1;
            color: #b45309;
            border-radius: 99px;
            padding: 0.12rem 0.5rem;
            white-space: nowrap;
        }

        .post-timestamp {
            font-size: 0.75rem;
            color: #aeaeb2;
            margin-left: auto;
        }

        .post-delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #d2d2d7;
            padding: 0.2rem;
            border-radius: 6px;
            display: flex;
            align-items: center;
            transition: color 0.2s;
            margin-left: 0.25rem;
        }

        .post-delete-btn:hover { color: #ef4444; }

        .post-content {
            font-size: 0.925rem;
            color: #1d1d1f;
            line-height: 1.65;
            white-space: pre-wrap;
            word-break: break-word;
            margin-top: 0.35rem;
        }

        .post-image {
            margin-top: 0.75rem;
            width: 100%;
            max-height: 380px;
            object-fit: cover;
            border-radius: 12px;
            display: block;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.35rem;
            margin-top: 0.6rem;
        }

        .tag-pill {
            font-size: 0.72rem;
            font-weight: 600;
            padding: 0.18rem 0.6rem;
            border-radius: 99px;
        }

        .tag-pill:nth-child(3n+1) { background: #f0f9ff; color: #0369a1; }
        .tag-pill:nth-child(3n+2) { background: #f0fdf4; color: #166534; }
        .tag-pill:nth-child(3n)   { background: #fdf4ff; color: #7c3aed; }

        /* ── Right Side: Vertical Action Buttons (TikTok-style) ── */
        .post-actions-col {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding-left: 1rem;
            margin-left: 0.5rem;
            justify-content: center;
        }

        .side-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .side-action-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            color: #6e6e73;
        }

        .side-action:hover .side-action-icon {
            background: #ebebed;
            transform: scale(1.08);
        }

        .side-action.liked .side-action-icon {
            background: #fee2e2;
            color: #ef4444;
        }

        .side-action.commented .side-action-icon {
            background: #eff6ff;
            color: #2563eb;
        }

        .side-action-count {
            font-size: 0.7rem;
            font-weight: 700;
            color: #6e6e73;
            font-variant-numeric: tabular-nums;
        }

        .side-action.liked .side-action-count { color: #ef4444; }
        .side-action.commented .side-action-count { color: #2563eb; }

        /* ── Comments Section ── */
        .comments-section {
            border-top: 1px solid #f5f5f7;
            background: #fafafa;
            padding: 1rem 1.25rem;
            display: none;
        }

        .comments-section.open {
            display: block;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            margin-bottom: 1rem;
        }

        .comment-item {
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
            animation: fadeSlideIn 0.2s ease;
        }

        .comment-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ffd700;
            flex-shrink: 0;
        }

        .comment-avatar-initials {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #ffd700;
            color: #111;
            font-weight: 800;
            font-size: 0.65rem;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .comment-bubble {
            flex: 1;
            background: #ffffff;
            border-radius: 12px;
            padding: 0.625rem 0.875rem;
            border: 1px solid #e5e5ea;
        }

        .comment-author {
            font-size: 0.8rem;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 0.2rem;
        }

        .comment-text {
            font-size: 0.875rem;
            color: #1d1d1f;
            line-height: 1.55;
            word-break: break-word;
        }

        .comment-time {
            font-size: 0.7rem;
            color: #aeaeb2;
            margin-top: 0.25rem;
        }

        .comment-loading {
            font-size: 0.85rem;
            color: #aeaeb2;
            text-align: center;
            padding: 0.75rem 0;
        }

        /* ── Add Comment ── */
        .add-comment-row {
            display: flex;
            gap: 0.6rem;
            align-items: flex-end;
        }

        .comment-input {
            flex: 1;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            padding: 0.55rem 0.875rem;
            font-size: 0.875rem;
            background: #ffffff;
            color: #1d1d1f;
            resize: none;
            min-height: 40px;
            max-height: 100px;
            line-height: 1.5;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .comment-input::placeholder { color: #aeaeb2; }

        .comment-input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.18);
        }

        .comment-submit-btn {
            background: #ffd700;
            border: none;
            border-radius: 10px;
            padding: 0.55rem 1rem;
            font-size: 0.82rem;
            font-weight: 700;
            color: #111;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .comment-submit-btn:hover {
            background: #f5cc00;
            box-shadow: 0 4px 12px rgba(245, 204, 0, 0.4);
        }

        .comment-submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── Skeleton Loader ── */
        .skeleton-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05), 0 4px 16px rgba(0,0,0,0.04);
        }

        .skel {
            background: linear-gradient(90deg, #f5f5f7 25%, #ebebed 50%, #f5f5f7 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skel-header {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin-bottom: 1rem;
        }

        .skel-avatar { width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0; }
        .skel-lines { flex: 1; display: flex; flex-direction: column; gap: 0.4rem; }
        .skel-line { height: 12px; }
        .skel-line.w60 { width: 60%; }
        .skel-line.w40 { width: 40%; }
        .skel-body { height: 14px; margin-bottom: 0.4rem; }
        .skel-body.w100 { width: 100%; }
        .skel-body.w80 { width: 80%; }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-state-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            background: #fff8e1;
            display: grid;
            place-items: center;
            font-size: 2rem;
        }

        .empty-state h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1d1d1f;
        }

        .empty-state p {
            font-size: 0.9rem;
            color: #6e6e73;
            max-width: 320px;
            line-height: 1.6;
        }

        /* ── Error Banner ── */
        .feed-error {
            background: #fff0f0;
            border: 1px solid #fecaca;
            border-radius: 12px;
            padding: 1rem 1.25rem;
            font-size: 0.875rem;
            color: #b91c1c;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .top-bar { padding: 0 1rem; }
            .feed-wrap { padding: 1rem 0.5rem 3rem; }
        }

        @media (max-width: 480px) {
            .top-bar-name { display: none; }
            .compose-card { border-radius: 12px; }
            .post-card { border-radius: 12px; }
        }
    </style>
</head>

    <script>
    // ── Constants ──────────────────────────────────────────────
    var GAS_URL = 'https://script.google.com/macros/s/AKfycbxivCGau_AAvXVPa20svMiZKRmm2IXqk6vT7KL_nmnCcIR8pz2wwUHekONomebDaM0L2w/exec';
    var TIMEOUT_MS = 20000;

    // ── Session ────────────────────────────────────────────────
    var _sess = {};
    try { _sess = JSON.parse(sessionStorage.getItem('hopics_user') || '{}'); } catch(e) {}

    if (!_sess.email) {
        window.location.href = 'index.html';
    }

    var _isAdmin = (_sess.role === 'admin' || _sess.role === 'Admin' || _sess.role === 'administrator');

    // ── UI init (top bar + compose avatar) ────────────────────
    document.addEventListener('DOMContentLoaded', function() {
        // Admin link
        if (_isAdmin) {
            var al = document.getElementById('adminLink');
            if (al) al.style.display = 'flex';
            var arl = document.getElementById('allReferralsLink');
            if (arl) arl.style.display = 'flex';
        }

        // Top bar
        var tbAvatar   = document.getElementById('tbAvatar');
        var tbInitials = document.getElementById('tbInitials');
        var tbName     = document.getElementById('tbName');

        if (_sess.picture) {
            tbAvatar.src = _sess.picture;
            tbAvatar.style.display = 'block';
        } else {
            tbAvatar.style.display = 'none';
            tbInitials.style.display = 'grid';
        }
        tbInitials.textContent = initials(_sess.name || _sess.email || '?');
        tbName.textContent = _sess.name || '';

        // Populate fixed profile pill (top-right)
        var sbAv = document.getElementById('sidebarAvatar');
        var sbNm = document.getElementById('sidebarName');
        if (sbAv) {
            if (_sess.picture) {
                sbAv.innerHTML = '<img src="' + _sess.picture + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.parentNode.textContent=\'' + initials(_sess.name||'?') + '\'">';
            } else {
                sbAv.textContent = initials(_sess.name || _sess.email || '?');
            }
        }
        if (sbNm) sbNm.textContent = _sess.name || '';

        // Compose avatar
        var caImg  = document.getElementById('composeAvatarImg');
        var caInit = document.getElementById('composeAvatarInit');
        if (_sess.picture) {
            caImg.src = _sess.picture;
            caImg.style.display = 'block';
        } else {
            caImg.style.display = 'none';
            caInit.style.display = 'grid';
        }
        caInit.textContent = initials(_sess.name || _sess.email || '?');

        // Load posts
        loadPosts(false);
    });

    // ── Helpers ────────────────────────────────────────────────
    function initials(str) {
        if (!str) return '?';
        var parts = str.trim().split(/\s+/);
        if (parts.length === 1) return parts[0].charAt(0).toUpperCase();
        return (parts[0].charAt(0) + parts[parts.length - 1].charAt(0)).toUpperCase();
    }

    function relativeTime(ts) {
        if (!ts) return '';
        var now  = Date.now();
        var then = new Date(ts).getTime();
        if (isNaN(then)) return ts;
        var diff = Math.floor((now - then) / 1000);
        if (diff < 60)   return 'Just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
        return new Date(then).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&#39;');
    }

    // ── JSONP helper ───────────────────────────────────────────
    var _cbCounter = 0;
    function jsonpGet(params, timeout) {
        return new Promise(function(resolve, reject) {
            var cbName = '__hopics_cb_' + (++_cbCounter) + '_' + Date.now();
            var script = document.createElement('script');
            var timer  = setTimeout(function() {
                cleanup();
                reject(new Error('JSONP timeout'));
            }, timeout || TIMEOUT_MS);

            window[cbName] = function(data) {
                cleanup();
                resolve(data);
            };

            var qs = Object.keys(params).map(function(k) {
                return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
            }).join('&');

            script.src = GAS_URL + '?' + qs + '&callback=' + cbName;
            script.onerror = function() { cleanup(); reject(new Error('Script load error')); };
            document.head.appendChild(script);

            function cleanup() {
                clearTimeout(timer);
                delete window[cbName];
                if (script.parentNode) script.parentNode.removeChild(script);
            }
        });
    }

    // ── Fetch POST (with CORS) ───────────────────────────────────
    function gasPost(fields) {
        var body = new URLSearchParams();
        Object.keys(fields).forEach(function(k) { body.append(k, fields[k] || ''); });
        return fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: body.toString()
        }).then(response => response.json());
    }

    // ── Load Posts ─────────────────────────────────────────────
    // ── Own-post notifications ─────────────────────────────────
    function checkOwnPostNotifications(posts) {
        var myEmail = (_sess && _sess.email) ? _sess.email.toLowerCase() : '';
        if (!myEmail) return;

        var storageKey = 'hopics_post_seen_' + myEmail;
        var seen = {};
        try { seen = JSON.parse(localStorage.getItem(storageKey) || '{}'); } catch(e) {}

        var msgs = [];
        posts.forEach(function(p) {
            var author = (p.authorEmail || '').toLowerCase();
            if (author !== myEmail) return;
            var id     = p.id || p.postId || '';
            var likes  = parseInt(p.likes || 0);
            var comms  = parseInt(p.commentCount || p.comments || 0);
            var prev   = seen[id] || { likes: 0, comments: 0 };
            var newLikes = likes - (prev.likes || 0);
            var newComms = comms - (prev.comments || 0);
            if (newLikes > 0) msgs.push((newLikes === 1 ? '1 new like' : newLikes + ' new likes') + ' on your post');
            if (newComms > 0) msgs.push((newComms === 1 ? '1 new comment' : newComms + ' new comments') + ' on your post');
            seen[id] = { likes: likes, comments: comms };
        });

        try { localStorage.setItem(storageKey, JSON.stringify(seen)); } catch(e) {}

        if (msgs.length) {
            setTimeout(function() {
                msgs.forEach(function(m) { showToast(m, 'info'); });
            }, 800);
        }
    }

    function loadPosts(isRetry) {
        jsonpGet({ action: 'listPosts' }, TIMEOUT_MS)
            .then(function(data) {
                removeSkeleons();
                if (!data.success) throw new Error(data.error || 'GAS error');
                renderFeed(data.posts || []);
            })
            .catch(function(err) {
                if (!isRetry) {
                    // One retry after 3s (GAS cold start)
                    setTimeout(function() { loadPosts(true); }, 3000);
                } else {
                    removeSkeleons();
                    showFeedError('Could not load posts. Please refresh to try again.');
                    console.error('[Community] loadPosts error:', err);
                }
            });
    }

    function removeSkeleons() {
        ['skel1','skel2'].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) el.parentNode.removeChild(el);
        });
    }

    function showFeedError(msg) {
        var fc = document.getElementById('feedContainer');
        var div = document.createElement('div');
        div.className = 'feed-error';
        div.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ' + escHtml(msg);
        fc.appendChild(div);
    }

    // ── Render Feed ────────────────────────────────────────────
    function renderFeed(posts) {
        var fc = document.getElementById('feedContainer');

        if (!posts.length) {
            fc.innerHTML = '';
            fc.appendChild(buildEmptyState());
            populateDiscover([]);
            return;
        }

        fc.innerHTML = '';
        checkOwnPostNotifications(posts);
        posts.sort(function(a, b) {
            var ta = new Date(a.lastActivity || a.timestamp).getTime();
            var tb = new Date(b.lastActivity || b.timestamp).getTime();
            return tb - ta;
        });
        posts.forEach(function(post) {
            fc.appendChild(buildPostCard(post));
        });
        populateDiscover(posts);
    }

    function buildEmptyState() {
        var div = document.createElement('div');
        div.className = 'empty-state';
        div.innerHTML = [
            '<div class="empty-state-icon">💬</div>',
            '<h3>No posts yet</h3>',
            '<p>Be the first to post! Share a client routing challenge, ask a question, or start a conversation with your colleagues.</p>'
        ].join('');
        return div;
    }

    // ── Build Post Card (TikTok-style vertical actions) ────────
    function buildPostCard(post) {
        var canDelete = _isAdmin || (post.authorEmail && post.authorEmail === _sess.email);
        var tags      = parseTags(post.tags);
        var likeCount = parseInt(post.likes) || 0;
        var handle    = post.authorEmail ? '@' + post.authorEmail.split('@')[0] : '';

        var card = document.createElement('div');
        card.className = 'post-card';
        card.dataset.postId = post.postId;

        var safePostId = escHtml(post.postId);

        // ── Inner row: avatar | content | side actions ──
        var innerHtml = '<div class="post-inner">' +

            // Left: avatar
            '<div class="post-avatar-col">' +
                avatarHtml(post.authorPhoto, post.authorName, 'post-avatar', 'post-avatar-initials') +
            '</div>' +

            // Center: content
            '<div class="post-main-col">' +
                '<div class="post-meta">' +
                    '<div class="post-author-row">' +
                        '<span class="post-author-name">' + escHtml(post.authorName || 'Staff') + '</span>' +
                        '<span class="post-author-handle">' + escHtml(handle) + '</span>' +
                        (post.program ? '<span class="post-program-badge">' + escHtml(post.program) + '</span>' : '') +
                        '<span class="post-timestamp">' + relativeTime(post.timestamp) + '</span>' +
                        (canDelete ? '<button class="post-delete-btn" title="Delete" onclick="deletePost(this,\'' + safePostId + '\')">' +
                            '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>' +
                        '</button>' : '') +
                    '</div>' +
                '</div>' +
                '<p class="post-content">' + escHtml(post.content) + '</p>' +
                (post.imageUrl ? '<img class="post-image" src="' + escHtml(post.imageUrl) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '') +
                (tags.length ? '<div class="post-tags">' + tags.map(function(t){ return '<span class="tag-pill">' + escHtml(t) + '</span>'; }).join('') + '</div>' : '') +
            '</div>' +

            // Right: vertical action buttons
            '<div class="post-actions-col">' +
                '<button class="side-action like-btn" onclick="likePost(this,\'' + safePostId + '\')">' +
                    '<div class="side-action-icon">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' +
                    '</div>' +
                    '<span class="side-action-count like-count">' + likeCount + '</span>' +
                '</button>' +
                '<button class="side-action comment-btn" onclick="toggleComments(this,\'' + safePostId + '\')">' +
                    '<div class="side-action-icon">' +
                        '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
                    '</div>' +
                    '<span class="side-action-count comment-count">0</span>' +
                '</button>' +
            '</div>' +

        '</div>'; // /post-inner

        // Comments section (below inner row)
        var commentsHtml = '<div class="comments-section" id="comments-' + safePostId + '">' +
            '<div class="comment-list" id="comment-list-' + safePostId + '">' +
                '<div class="comment-loading">Loading comments…</div>' +
            '</div>' +
            '<div class="add-comment-row">' +
                avatarHtml(_sess.picture, _sess.name, 'comment-avatar', 'comment-avatar-initials') +
                '<textarea class="comment-input" placeholder="Write a comment…" rows="1" ' +
                    'oninput="autoGrow(this)" id="comment-input-' + safePostId + '"></textarea>' +
                '<button class="comment-submit-btn" onclick="submitComment(\'' + safePostId + '\')">Send</button>' +
            '</div>' +
        '</div>';

        card.innerHTML = innerHtml + commentsHtml;
        return card;
    }

    // ── Avatar HTML helper ─────────────────────────────────────
    function avatarHtml(photoUrl, name, imgClass, initClass) {
        var init = initials(name || '?');
        if (photoUrl) {
            return '<img class="' + imgClass + '" src="' + escHtml(photoUrl) + '" alt="' + escHtml(name) + '" ' +
                'onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'grid\'">' +
                '<div class="' + initClass + '" style="display:none">' + escHtml(init) + '</div>';
        }
        return '<div class="' + initClass + '" style="display:grid">' + escHtml(init) + '</div>';
    }

    function parseTags(tagsStr) {
        if (!tagsStr) return [];
        return tagsStr.split(',').map(function(t) { return t.trim(); }).filter(Boolean);
    }

    // ── Toggle Image Input ─────────────────────────────────────
    function toggleImageInput() {
        var row = document.getElementById('composeImageRow');
        var btn = document.getElementById('toggleImageBtn');
        var isOpen = row.classList.toggle('open');
        btn.style.color = isOpen ? '#ffd700' : '';
        if (!isOpen) {
            clearImageAttachment();
        }
    }

    // ── Image file handling ────────────────────────────────────
    var _imageDataUrl = null;

    function handleImageFile(input) {
        var file = input.files && input.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function(e) {
            var img = new Image();
            img.onload = function() {
                var MAX = 600;
                var w = img.width, h = img.height;
                if (w > MAX || h > MAX) {
                    if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
                    else       { w = Math.round(w * MAX / h); h = MAX; }
                }
                var canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                _imageDataUrl = canvas.toDataURL('image/jpeg', 0.55);
                document.getElementById('imagePreview').src = _imageDataUrl;
                document.getElementById('imagePreviewWrap').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function clearImageAttachment() {
        _imageDataUrl = null;
        document.getElementById('composeImageUrl').value = '';
        document.getElementById('composeImageFile').value = '';
        document.getElementById('imagePreview').src = '';
        document.getElementById('imagePreviewWrap').style.display = 'none';
    }

    // ── Auto-grow textarea ─────────────────────────────────────
    function autoGrow(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ── Submit Post ────────────────────────────────────────────
    function submitPost() {
        var content = document.getElementById('composeText').value.trim();
        if (!content) { showToast('Please write something before posting.', 'info'); return; }

        var imageUrl = _imageDataUrl || document.getElementById('composeImageUrl').value.trim();
        var tags     = document.getElementById('composeTags').value.trim();

        var btn = document.getElementById('postBtn');
        btn.disabled = true;
        btn.textContent = 'Posting…';

        var tempId = 'temp-' + Date.now();
        var tempPost = {
            postId: tempId,
            timestamp: new Date().toISOString(),
            authorName: _sess.name || _sess.email,
            authorEmail: _sess.email,
            authorPhoto: _sess.picture || '',
            program: _sess.program || '',
            content: content,
            imageUrl: imageUrl,
            tags: tags,
            likes: 0,
            lastActivity: new Date().toISOString()
        };

        // Optimistic render
        var fc = document.getElementById('feedContainer');
        var emptyState = fc.querySelector('.empty-state');
        if (emptyState) fc.removeChild(emptyState);
        var errBanner = fc.querySelector('.feed-error');
        if (errBanner) fc.removeChild(errBanner);

        var card = buildPostCard(tempPost);
        card.style.opacity = '0.6';
        fc.insertBefore(card, fc.firstChild);

        // Reset compose
        document.getElementById('composeText').value = '';
        document.getElementById('composeTags').value = '';
        clearImageAttachment();
        document.getElementById('composeImageRow').classList.remove('open');
        document.getElementById('toggleImageBtn').style.color = '';

        gasPost({
            action: 'addPost',
            authorName: _sess.name || _sess.email || '',
            authorEmail: _sess.email || '',
            authorPhoto: _sess.picture || '',
            content: content,
            imageUrl: imageUrl,
            tags: tags
        }).then(function(data) {
            card.style.opacity = '1';
            if (data && data.success) {
                showToast('Post published!', 'success');
            } else {
                showToast('Failed to publish post: ' + (data ? data.message || 'Unknown error' : 'No response'), 'error');
            }
        }).catch(function(err) {
            card.style.opacity = '1';
            showToast('Error publishing post', 'error');
            console.warn('[Community] addPost:', err);
        }).finally(function() {
            btn.disabled = false;
            btn.textContent = 'Post';
        });
    }

    // ── Like Post ──────────────────────────────────────────────
    function likePost(btn, postId) {
        var countEl = btn.querySelector('.like-count');
        var current = parseInt(countEl.textContent) || 0;
        btn.classList.toggle('liked');
        var isLiked = btn.classList.contains('liked');
        countEl.textContent = isLiked ? current + 1 : Math.max(0, current - 1);
        gasPost({ action: 'likePost', postId: postId })
            .then(function(data) {
                if (!data || !data.success) {
                    // Revert on failure
                    btn.classList.toggle('liked');
                    countEl.textContent = current;
                    showToast('Failed to like post', 'error');
                }
            })
            .catch(function() {
                btn.classList.toggle('liked');
                countEl.textContent = current;
                showToast('Error liking post', 'error');
            });
    }

    // ── Populate Discover Panel ────────────────────────────────
    function populateDiscover(posts) {
        // Trending tags
        var tagMap = {};
        posts.forEach(function(p) {
            parseTags(p.tags).forEach(function(t) {
                tagMap[t] = (tagMap[t] || 0) + 1;
            });
        });
        var tagsSorted = Object.keys(tagMap).sort(function(a,b){ return tagMap[b]-tagMap[a]; }).slice(0,12);
        var trendEl = document.getElementById('trendingTags');
        var trendCard = document.getElementById('trendingCard');
        if (tagsSorted.length && trendEl) {
            trendEl.innerHTML = tagsSorted.map(function(t) {
                return '<span class="trending-tag">#' + escHtml(t) + '</span>';
            }).join('');
            if (trendCard) trendCard.style.display = '';
        }

        // Active staff (unique authors)
        var seen = {};
        var staffList = [];
        posts.forEach(function(p) {
            if (p.authorEmail && !seen[p.authorEmail]) {
                seen[p.authorEmail] = true;
                staffList.push({ name: p.authorName || p.authorEmail, email: p.authorEmail, program: p.program || '' });
            }
        });
        var listEl = document.getElementById('discoverStaffList');
        if (listEl) {
            if (!staffList.length) {
                listEl.innerHTML = '<div style="font-size:0.8rem;color:#aeaeb2;">No recent activity.</div>';
            } else {
                listEl.innerHTML = staffList.slice(0,8).map(function(s) {
                    var init = initials(s.name);
                    return '<div class="discover-staff-item">' +
                        '<div class="discover-staff-av">' + escHtml(init) + '</div>' +
                        '<div><div class="discover-staff-name">' + escHtml(s.name) + '</div>' +
                        (s.program ? '<div class="discover-staff-prog">' + escHtml(s.program) + '</div>' : '') +
                        '</div></div>';
                }).join('');
            }
        }
    }

    // ── Toggle Comments ────────────────────────────────────────
    var _commentsLoaded = {};

    function toggleComments(btn, postId) {
        var section = document.getElementById('comments-' + postId);
        if (!section) return;
        var isOpen = section.classList.toggle('open');

        if (isOpen && !_commentsLoaded[postId]) {
            _commentsLoaded[postId] = 'loading';
            loadComments(postId);
        }
    }

    function loadComments(postId, isRetry) {
        jsonpGet({ action: 'listComments', postId: postId }, TIMEOUT_MS)
            .then(function(data) {
                _commentsLoaded[postId] = 'done';
                if (!data.success) throw new Error(data.error || 'GAS error');
                renderComments(postId, data.comments || []);
            })
            .catch(function(err) {
                if (!isRetry) {
                    setTimeout(function() { loadComments(postId, true); }, 3000);
                } else {
                    _commentsLoaded[postId] = 'error';
                    var listEl = document.getElementById('comment-list-' + postId);
                    if (listEl) listEl.innerHTML = '<div class="comment-loading" style="color:#b91c1c">Could not load comments.</div>';
                    console.error('[Community] loadComments:', err);
                }
            });
    }

    function renderComments(postId, comments) {
        var listEl = document.getElementById('comment-list-' + postId);
        if (!listEl) return;
        listEl.innerHTML = '';

        if (!comments.length) {
            listEl.innerHTML = '<div class="comment-loading">No comments yet. Be the first!</div>';
        } else {
            comments.forEach(function(c) {
                listEl.appendChild(buildCommentItem(c));
            });
        }

        // Update comment count on action bar
        var card = document.querySelector('[data-post-id="' + postId + '"]');
        if (card) {
            var countEl = card.querySelector('.comment-count');
            if (countEl) countEl.textContent = comments.length;
        }
    }

    function buildCommentItem(comment) {
        var div = document.createElement('div');
        div.className = 'comment-item';
        div.innerHTML =
            avatarHtml(comment.authorPhoto, comment.authorName, 'comment-avatar', 'comment-avatar-initials') +
            '<div class="comment-bubble">' +
                '<div class="comment-author">' + escHtml(comment.authorName || 'Staff') + '</div>' +
                '<div class="comment-text">' + escHtml(comment.content) + '</div>' +
                '<div class="comment-time">' + relativeTime(comment.timestamp) + '</div>' +
            '</div>';
        return div;
    }

    // ── Submit Comment ─────────────────────────────────────────
    function submitComment(postId) {
        var input = document.getElementById('comment-input-' + postId);
        if (!input) return;
        var content = input.value.trim();
        if (!content) return;

        var submitBtn = input.nextElementSibling;
        submitBtn.disabled = true;
        submitBtn.textContent = '…';

        // Optimistic render
        var listEl = document.getElementById('comment-list-' + postId);
        if (listEl) {
            var emptyMsg = listEl.querySelector('.comment-loading');
            if (emptyMsg) listEl.removeChild(emptyMsg);

            var tempComment = {
                commentId: 'temp-' + Date.now(),
                postId: postId,
                timestamp: new Date().toISOString(),
                authorName: _sess.name || _sess.email,
                authorEmail: _sess.email,
                authorPhoto: _sess.picture || '',
                content: content
            };
            var item = buildCommentItem(tempComment);
            item.style.opacity = '0.6';
            listEl.appendChild(item);

            // Update comment count
            var card = document.querySelector('[data-post-id="' + postId + '"]');
            if (card) {
                var countEl = card.querySelector('.comment-count');
                if (countEl) countEl.textContent = parseInt(countEl.textContent || 0) + 1;
            }

            // Scroll to new comment
            item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

            input.value = '';
            input.style.height = 'auto';

            gasPost({
                action: 'addComment',
                postId: postId,
                authorName: _sess.name || _sess.email || '',
                authorEmail: _sess.email || '',
                authorPhoto: _sess.picture || '',
                content: content
            }).then(function(data) {
                item.style.opacity = '1';
                if (!data || !data.success) {
                    showToast('Failed to add comment', 'error');
                }
            }).catch(function(err) {
                item.style.opacity = '1';
                showToast('Error adding comment', 'error');
                console.warn('[Community] addComment:', err);
            }).finally(function() {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Send';
            });
        }
    }

    // ── Delete Post ────────────────────────────────────────────
    function deletePost(btn, postId) {
        if (!confirm('Delete this post? This cannot be undone.')) return;

        var card = document.querySelector('[data-post-id="' + postId + '"]');
        if (card) {
            card.style.opacity = '0.4';
            card.style.pointerEvents = 'none';
        }

        gasPost({ action: 'deletePost', postId: postId })
            .then(function(data) {
                if (data && data.success) {
                    if (card && card.parentNode) {
                        card.style.transition = 'opacity 0.3s ease, transform 0.3s ease, max-height 0.35s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.97)';
                        setTimeout(function() {
                            if (card.parentNode) card.parentNode.removeChild(card);
                            // Show empty state if no posts left
                            var fc = document.getElementById('feedContainer');
                            if (fc && !fc.querySelector('.post-card')) {
                                fc.appendChild(buildEmptyState());
                            }
                        }, 320);
                    }
                    showToast('Post deleted.', 'info');
                } else {
                    // Revert on failure
                    if (card) {
                        card.style.opacity = '1';
                        card.style.pointerEvents = '';
                    }
                    showToast('Failed to delete post', 'error');
                }
            })
            .catch(function(err) {
                if (card) {
                    card.style.opacity = '1';
                    card.style.pointerEvents = '';
                }
                showToast('Error deleting post', 'error');
                console.warn('[Community] deletePost:', err);
            });
    }
    </script>
